<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 70">
  <!-- "hello" top line -->
  <text x="10" y="30" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="28" fill="#1A1A1A">hello</text>
  <!-- "w" + gap for special O + "rk" bottom line -->
  <text x="10" y="60" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="28" fill="#1A1A1A">w</text>
  <!-- Stylized open "O" (like a C shape) -->
  <circle cx="65" cy="47" r="13" fill="none" stroke="#1A1A1A" stroke-width="5.5"/>
  <!-- Mask to open the right side -->
  <rect x="73" y="34" width="12" height="26" fill="white"/>
  <!-- "rk" -->
  <text x="80" y="60" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="28" fill="#1A1A1A">rk</text>
</svg>
