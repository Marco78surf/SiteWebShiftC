<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 70">
  <!-- Orange square -->
  <rect x="4" y="8" width="54" height="54" rx="6" fill="#FF7900"/>
  <!-- "orange" text in white inside square -->
  <text x="31" y="33" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="13" fill="white">orange</text>
  <!-- TM superscript -->
  <text x="56" y="19" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="7" fill="white">™</text>
  <!-- "Business" bold black text -->
  <text x="160" y="48" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="28" fill="#1A1A1A">Business</text>
</svg>
