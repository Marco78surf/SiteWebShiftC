<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" fill="none">
  <rect width="600" height="280" fill="#0a1a10"/>
  <!-- Grid pattern - represents structured CRM deployment -->
  <defs>
    <linearGradient id="sg1" x1="0" y1="0" x2="600" y2="280">
      <stop offset="0%" stop-color="#6edea0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6edea0" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <rect width="600" height="280" fill="url(#sg1)"/>
  <!-- Abstract cloud nodes -->
  <circle cx="150" cy="140" r="45" stroke="#6edea0" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>
  <circle cx="150" cy="140" r="25" stroke="#6edea0" stroke-opacity="0.35" stroke-width="1" fill="#6edea0" fill-opacity="0.06"/>
  <circle cx="300" cy="100" r="35" stroke="#6edea0" stroke-opacity="0.15" stroke-width="1.5" fill="none"/>
  <circle cx="300" cy="100" r="18" stroke="#6edea0" stroke-opacity="0.3" stroke-width="1" fill="#6edea0" fill-opacity="0.05"/>
  <circle cx="450" cy="140" r="50" stroke="#6edea0" stroke-opacity="0.12" stroke-width="1.5" fill="none"/>
  <circle cx="450" cy="140" r="30" stroke="#6edea0" stroke-opacity="0.25" stroke-width="1" fill="#6edea0" fill-opacity="0.04"/>
  <circle cx="300" cy="200" r="28" stroke="#6edea0" stroke-opacity="0.18" stroke-width="1.5" fill="none"/>
  <!-- Connection lines -->
  <line x1="175" y1="125" x2="265" y2="105" stroke="#6edea0" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="335" y1="100" x2="400" y2="130" stroke="#6edea0" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="175" y1="155" x2="272" y2="195" stroke="#6edea0" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="328" y1="200" x2="420" y2="160" stroke="#6edea0" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="300" y1="135" x2="300" y2="172" stroke="#6edea0" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Accent dots -->
  <circle cx="150" cy="140" r="4" fill="#6edea0" fill-opacity="0.5"/>
  <circle cx="300" cy="100" r="3" fill="#6edea0" fill-opacity="0.4"/>
  <circle cx="450" cy="140" r="4" fill="#6edea0" fill-opacity="0.35"/>
  <circle cx="300" cy="200" r="3" fill="#6edea0" fill-opacity="0.4"/>
</svg>